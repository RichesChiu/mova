name: Sync Docker Hub Overview

on:
  workflow_dispatch:
  push:
    branches:
      - master
    paths:
      - docs/DOCKER_HUB.md
      - .github/workflows/sync-dockerhub-overview.yml

permissions:
  contents: read

concurrency:
  group: sync-dockerhub-overview
  cancel-in-progress: true

jobs:
  sync:
    name: Update Docker Hub repository description
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@d23441a48e516b6c34aea4fa41551a30e30af803 # v6

      - name: Update Docker Hub Overview
        uses: peter-evans/dockerhub-description@1b9a80c056b620d92cedb9d9b5a223409c68ddfa # v5
        with:
          username: ${{ vars.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
          repository: richeschiu/mova
          short-description: 用 Rust 构建的轻量自托管媒体服务器，整理并播放本地电影与剧集。
          readme-filepath: ./docs/DOCKER_HUB.md
