<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>MOVA</title>
    <script>
      const path = window.location.pathname.replace(/\/+$/, '')

      if (path === '/api') {
        window.location.replace('/#api')
      } else {
        window.location.replace('/')
      }
    </script>
  </head>
